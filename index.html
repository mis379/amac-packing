<script>


// Detect if running inside GAS or GitHub Pages
function isGAS() { 
  try { return (typeof google !== 'undefined' && typeof google.script !== 'undefined'); } 
  catch(e) { return false; } 
}
var IS_GAS = false; // will be set after page loads
try { IS_GAS = isGAS(); } catch(e) {}

/* gasCall removed */

var GAS_URL = 'https://script.google.com/macros/s/AKfycbx45o0HYTLvgGyS9BNWhOZrx2qJKZQ_TnKzPXXR2g0RWC2P7w5s792EGApuscJpj5Ni/exec';
function isGAS() { 
  try { return (typeof google !== 'undefined' && typeof google.script !== 'undefined'); } 
  catch(e) { return false; } 
}
var IS_GAS = false; // will be set after page loads
try { IS_GAS = isGAS(); } catch(e) {}
var S = { order:null, box:'BOX-01', packer:'', panels:[], cutlist:[], otype:'Wardrobe', stream:null, scanning:false, lastCode:null };

// Proxy for gsr that works on GitHub Pages too
var gsr = {
  _sh: null, _fh: null,
  withSuccessHandler: function(fn){ var n=Object.create(gsr); n._sh=fn; n._fh=gsr._fh; return n; },
  withFailureHandler: function(fn){ var n=Object.create(gsr); n._fh=fn; n._sh=gsr._sh; return n; },
  _call: function(fn, args) {
    var sh=this._sh, fh=this._fh;
    if(isGAS()) {
      var r=gsr;
      if(sh) r=r.withSuccessHandler(sh);
      if(fh) r=r.withFailureHandler(fh);
      r[fn].apply(r, args||[]);
    } else {
      var url = GAS_URL + '?fn='+encodeURIComponent(fn)+'&args='+encodeURIComponent(JSON.stringify(args||[]));
      fetch(url)
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.error){if(fh)fh({message:d.error});return;}
          if(sh)sh(d.result!==undefined?d.result:d);
        })
        .catch(function(e){if(fh)fh(e);});
    }
  }
};
// Create proxy methods for all GAS functions
['getSettings','getOrders','getCutlist','getBoxPanels','getPackingReport','addPanelToBox',
 'saveOrder','uploadCutlist','sealBox','saveSetting','setupSheets','getBoxes'].forEach(function(fn){
  gsr[fn] = function(){
    var args = Array.prototype.slice.call(arguments);
    var obj = {
      _sh: gsr._sh, _fh: gsr._fh,
      withSuccessHandler: function(f){this._sh=f;return this;},
      withFailureHandler: function(f){this._fh=f;return this;}
    };
    // Execute call
    var sh=obj._sh, fh=obj._fh;
    if(isGAS()){
      var r=gsr;
      if(sh) r=r.withSuccessHandler(sh);
      if(fh) r=r.withFailureHandler(fh);
      r[fn].apply(r, args);
    } else {
      var url = GAS_URL+'?fn='+encodeURIComponent(fn)+'&args='+encodeURIComponent(JSON.stringify(args));
      fetch(url)
        .then(function(r){return r.json();})
        .then(function(d){if(d.error){if(fh)fh({message:d.error});return;}if(sh)sh(d.result!==undefined?d.result:d);})
        .catch(function(e){if(fh)fh(e);});
    }
    return obj;
  };
});

// ── BOOT
window.onload = function() {
  drawPack();
  gasCall('getSettings', [], function(s){
    S.packer = s.PackerName||'';
    var e = document.getElementById('hSub');
    if(e) e.textContent = (s.CompanyName||'AMAC')+' · '+(s.City||'Mohali');
    document.getElementById('cDot').style.background = '#4ade80';
  }, function(){
    document.getElementById('cDot').style.background = '#f87171';
  });
};

// ── NAV
function goTo(pg) {
  ['pack','cutlist','label','report','setup'].forEach(function(p){
    document.getElementById('pg-'+p).classList.remove('on');
    document.getElementById('nav-'+p).classList.remove('on');
  });
  document.getElementById('pg-'+pg).classList.add('on');
  document.getElementById('nav-'+pg).classList.add('on');
  if(pg==='pack') drawPack();
  else if(pg==='cutlist') drawCutlist();
  else if(pg==='label') drawLabel();
  else if(pg==='report') drawReport();
  else if(pg==='setup') drawSetup();
}

// ── JOB BAR
function updBar() {
  var b = document.getElementById('jBar');
  if(!S.order){ b.innerHTML='<p>No job selected — tap Pack to select</p>'; return; }
  var o=S.order;
  b.innerHTML='<div><div class="jname">'+x(o.OrderNo)+'</div><div class="jmeta">'+x(o.CustomerName)+' · '+x(o.Type)+' · '+x(o.Address||'')+'</div></div><button class="bedit" onclick="openOrd()">Edit Job</button>';
}

function x(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── PACK PAGE
function drawPack() {
  var pg = document.getElementById('pg-pack');
  updBar();
  if(!S.order){
    pg.innerHTML='<div class="empty" style="margin-top:40px"><div class="eico">📦</div><div class="etxt">No Job Selected</div><div class="esub">Select an order to start</div><button class="btn btn-p" style="margin-top:20px;max-width:240px" onclick="openOrd()">+ Select / Create Order</button></div>';
    return;
  }
  var total=parseInt(S.order.TotalPanels)||0;
  var chips=['BOX-01','BOX-02','BOX-03','BOX-04','BOX-05','BOX-06','BOX-07','BOX-08','BOX-09','BOX-10'].map(function(b){
    return '<button class="chip'+(b===S.box?' on':'')+'" onclick="swBox(\''+b+'\')">'+b+'</button>';
  }).join('');

  var plist='';
  if(S.panels.length===0){
    plist='<div class="empty" style="padding:20px"><div class="eico" style="font-size:32px">📦</div><div class="etxt">Scan first panel</div></div>';
  } else {
    for(var i=0;i<S.panels.length;i++){
      var p=S.panels[i];
      plist+='<div class="pr"><div class="pn">'+(i+1)+'</div><div class="pid">'+x(p.PanelID)+'</div><div class="ptyp">'+x(p.Module||p.Type||'—')+'</div><div class="pdim">'+x(p.L1||'—')+'×'+x(p.W1||'—')+'</div><div style="width:20px;text-align:center">✅</div></div>';
    }
  }

  pg.innerHTML=
    '<div class="card" style="text-align:center">'+
      '<div class="ctitle">Current Box <span style="float:right;color:#1a8a7a">'+S.box+'</span></div>'+
      '<div class="cw"><div class="circ"><div class="cn" id="cNum">'+S.panels.length+'</div><div class="ct">of '+total+'</div></div></div>'+
      '<div style="color:#6b7280;font-size:13px;font-weight:600">panels in box</div>'+
      '<div class="cr" style="justify-content:center;margin-top:12px">'+chips+'</div>'+
    '</div>'+
    '<div class="card" style="padding:12px 14px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
        '<div class="ctitle" style="margin:0">Panels in Box</div>'+
        '<span style="color:#e74c3c;font-size:13px;font-weight:600;cursor:pointer" onclick="clearBox()">Clear</span>'+
      '</div>'+
      '<div id="pList">'+plist+'</div>'+
    '</div>'+
    // CAMERA
    '<div class="cambox">'+
      '<div style="color:white;font-size:13px;font-weight:700;text-align:center;margin-bottom:12px;letter-spacing:1px">📷 SCAN PANEL BARCODE</div>'+
      '<div class="camframe" id="camFrame">'+
        '<video id="camVid" autoplay playsinline muted></video>'+
        '<div class="camline" id="camLine"></div>'+
        '<div id="camPh" class="camph">Camera band hai<br><small>Start tap karo</small></div>'+
      '</div>'+
      '<div class="camstat" id="camStat">Camera ready</div>'+
      '<div class="cambtn">'+
        '<button class="cbtn cbtn-start" id="btnStart" onclick="startCam()">📷 Start Camera</button>'+
        '<button class="cbtn cbtn-stop" id="btnStop" onclick="stopCam()">⏹ Stop</button>'+
      '</div>'+
    '</div>'+
    '<div class="manbox">'+
      '<div class="manlbl">Ya Manually Type Karo</div>'+
      '<div class="manrow">'+
        '<input class="maninp" id="mInp" placeholder="Panel ID type karo" onkeydown="if(event.key===\'Enter\')doMan()"/>'+
        '<button class="manadd" onclick="doMan()">Add</button>'+
      '</div>'+
    '</div>'+

function startCam() {
  if(!navigator.mediaDevices){ toast('Camera not supported','err'); return; }
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}})
  .then(function(stream){
    S.stream=stream; S.scanning=true;
    var vid=document.getElementById('camVid');
    var ph=document.getElementById('camPh');
    var ln=document.getElementById('camLine');
    if(vid){vid.srcObject=stream;vid.style.display='block';}
    if(ph)ph.style.display='none';
    if(ln)ln.style.display='block';
    document.getElementById('btnStart').style.display='none';
    document.getElementById('btnStop').style.display='inline-block';
    document.getElementById('camStat').textContent='🟢 Camera active...';
    loadZX();
  }).catch(function(e){
    toast('Camera error: '+e.message,'err');
  });
}

function stopCam(){
  S.scanning=false;
  if(S.stream){S.stream.getTracks().forEach(function(t){t.stop();});S.stream=null;}
  var vid=document.getElementById('camVid');
  var ph=document.getElementById('camPh');
  var ln=document.getElementById('camLine');
  if(vid){vid.srcObject=null;vid.style.display='none';}
  if(ph){ph.style.display='flex';}
  if(ln)ln.style.display='none';
  var bs=document.getElementById('btnStart');
  var bt=document.getElementById('btnStop');
  var st=document.getElementById('camStat');
  if(bs)bs.style.display='inline-block';
  if(bt)bt.style.display='none';
  if(st)st.textContent='Camera stopped';
}

function loadZX(){
  if(window.ZXingLoaded){scanLoop();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.21.1/zxing.min.js';
  s.onload=function(){window.ZXingLoaded=true;scanLoop();};
  s.onerror=function(){document.getElementById('camStat').textContent='Scanner lib error - manually type';};
  document.head.appendChild(s);
}

var scanCanvas=document.createElement('canvas');
var scanCtx=scanCanvas.getContext('2d');
var zxReader=null;

function scanLoop(){
  if(!S.scanning)return;
  var vid=document.getElementById('camVid');
  if(!vid||vid.readyState<2){setTimeout(scanLoop,200);return;}
  if(window.ZXing){
    try{
      if(!zxReader){
        var h=new Map();
        h.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.CODE_39]);
        zxReader=new ZXing.MultiFormatReader();
        zxReader.setHints(h);
      }
      scanCanvas.width=vid.videoWidth;
      scanCanvas.height=vid.videoHeight;
      scanCtx.drawImage(vid,0,0);
      var lum=new ZXing.HTMLCanvasElementLuminanceSource(scanCanvas);
      var bin=new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
      var r=zxReader.decode(bin);
      if(r&&r.text&&r.text!==S.lastCode){
        S.lastCode=r.text;
        document.getElementById('camStat').textContent='✅ '+r.text;
        try{var ac=new AudioContext(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=1000;g.gain.value=0.2;o.start();o.stop(ac.currentTime+0.15);}catch(e){}
        doPanel(r.text);
        setTimeout(function(){S.lastCode=null;},3000);
      }
    }catch(e){}
  }
  requestAnimationFrame(scanLoop);
}

function toast(msg,type){
  var t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.className='toast on t'+type;
  if(tT)clearTimeout(tT);
  tT=setTimeout(function(){t.classList.remove('on');},3000);
}
</script>
