<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AMAC Packing System</title>

<style>
:root {
  --teal: #1a8a7a;
  --teal-dark: #156b5e;
  --teal-light: #e8f7f5;
  --danger: #e74c3c;
  --success: #27ae60;
  --accent: #f0a500;
  --text: #1a1a2e;
  --muted: #6b7280;
  --bg: #f5f7fa;
  --border: #e2e8f0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

.header { background: var(--teal); color: white; padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.logo { width:36px; height:36px; background:rgba(255,255,255,0.2); border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; margin-right:10px; }
.h-title { font-size:16px; font-weight:700; }
.h-sub { font-size:11px; opacity:0.8; }
.sheets-badge { background:rgba(255,255,255,0.2); border-radius:20px; padding:4px 12px; font-size:12px; font-weight:600; display:flex; align-items:center; gap:5px; cursor:pointer; border:none; color:white; }
.dot { width:8px; height:8px; border-radius:50%; background:#f87171; }

.job-bar { background: var(--teal-dark); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; min-height:46px; }
.job-bar p { color:rgba(255,255,255,0.75); font-size:13px; }
.job-name { color:white; font-size:15px; font-weight:700; }
.job-meta { color:rgba(255,255,255,0.75); font-size:12px; }
.btn-edit { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; }

.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--border); display:flex; z-index:100; box-shadow:0 -2px 8px rgba(0,0,0,0.06); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 4px 10px; cursor:pointer; position:relative; background:none; border:none; }
.nav-item .ni { font-size:22px; }
.nav-item .nl { font-size:10px; font-weight:600; color:var(--muted); margin-top:2px; }
.nav-item.active .nl { color:var(--teal); }
.nav-item.active::after { content:''; position:absolute; top:0; left:20%; right:20%; height:2px; background:var(--teal); border-radius:0 0 4px 4px; }

.page { display:none; padding:16px; padding-bottom:85px; min-height:calc(100vh - 102px); }
.page.active { display:block; }

.card { background:white; border-radius:12px; padding:16px; box-shadow:var(--shadow); margin-bottom:12px; }
.card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:12px; }

.btn { display:flex; align-items:center; justify-content:center; gap:6px; padding:12px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; border:none; width:100%; }
.btn-primary { background:var(--teal); color:white; }
.btn-secondary { background:var(--teal-light); color:var(--teal); }
.btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--muted); }
.btn-sm { padding:8px 14px; font-size:13px; width:auto; border-radius:8px; }

.input-grp { margin-bottom:14px; }
.lbl { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px; color:var(--muted); margin-bottom:5px; }
.inp { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; color:var(--text); background:white; }
.inp:focus { outline:none; border-color:var(--teal); }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.stat-card { background:white; border-radius:12px; padding:14px; box-shadow:var(--shadow); text-align:center; }
.stat-num { font-size:28px; font-weight:800; color:var(--teal); }
.stat-lbl { font-size:11px; color:var(--muted); font-weight:600; }

.circle-wrap { display:flex; justify-content:center; margin:16px 0; }
.circle { width:130px; height:130px; border-radius:50%; border:6px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; }
.c-num { font-size:38px; font-weight:800; }
.c-total { font-size:13px; color:var(--muted); }

.chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.chip { padding:6px 14px; background:var(--teal-light); color:var(--teal); border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; border:none; }
.chip.active { background:var(--teal); color:white; }

.panel-row { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); gap:10px; }
.panel-row:last-child { border-bottom:none; }
.pr-num { width:24px; font-size:12px; color:var(--muted); font-weight:600; }
.pr-id { flex:1; font-size:13px; font-weight:700; }
.pr-type { flex:1; font-size:12px; color:var(--muted); }
.pr-dim { font-size:12px; color:var(--teal); font-weight:600; }
.pr-status { width:20px; text-align:center; }

.scan-area { background:#1a1a2e; border-radius:12px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:12px; }
.scan-frame { width:100%; max-width:300px; height:150px; border:2px solid var(--teal); border-radius:10px; overflow:hidden; background:black; display:flex; align-items:center; justify-content:center; position:relative; }
.scan-frame video { width:100%; height:100%; object-fit:cover; display:none; }
.scan-hint-txt { color:rgba(255,255,255,0.5); font-size:12px; text-align:center; }
.cam-status { color:var(--teal); font-size:12px; font-weight:600; text-align:center; }
.scan-line { position:absolute; left:5%; right:5%; height:2px; background:var(--teal); box-shadow:0 0 8px var(--teal); display:none; animation:scanAnim 2s ease-in-out infinite; }
@keyframes scanAnim { 0%,100%{top:15%} 50%{top:80%} }

.manual-box { background:white; border-radius:10px; padding:12px; margin-bottom:10px; }
.manual-lbl { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.manual-row { display:flex; gap:8px; }
.manual-inp { flex:1; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; }
.manual-inp:focus { outline:none; border-color:var(--teal); }
.btn-add-m { background:var(--teal); color:white; padding:10px 16px; border:none; border-radius:8px; font-weight:700; cursor:pointer; white-space:nowrap; }

.result-card { border-radius:12px; padding:16px; margin-bottom:10px; border:2px solid var(--border); background:white; }
.result-card.warn { border-color:#fbbf24; }
.result-card.ok { border-color:var(--success); }
.result-card.dup { border-color:var(--teal); }
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; margin-bottom:8px; }
.badge-warn { background:#fef3c7; color:#92400e; }
.badge-ok { background:#dcfce7; color:#166634; }
.badge-dup { background:#dbeafe; color:#1e40af; }
.res-id { font-size:24px; font-weight:800; margin-bottom:4px; word-break:break-all; }
.res-sub { font-size:13px; color:var(--muted); margin-bottom:10px; }
.dims-bar { background:#1a1a2e; color:white; border-radius:8px; padding:10px; text-align:center; font-size:14px; margin-bottom:10px; }
.dims-bar span { color:var(--teal); }
.meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.meta-item { background:var(--bg); border-radius:8px; padding:8px 10px; }
.mk { font-size:10px; font-weight:700; text-transform:uppercase; color:var(--muted); }
.mv { font-size:13px; font-weight:600; margin-top:2px; }
.action-row { display:flex; gap:10px; }

.order-item { background:white; border-radius:12px; padding:14px; margin-bottom:8px; box-shadow:var(--shadow); cursor:pointer; display:flex; align-items:center; justify-content:space-between; }
.o-name { font-size:15px; font-weight:700; }
.o-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.prog-bar { height:4px; background:var(--border); border-radius:4px; margin-top:8px; }
.prog-fill { height:100%; background:var(--teal); border-radius:4px; }
.status-tag { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.s-active { background:#dcfce7; color:#166634; }
.s-packed { background:#dbeafe; color:#1e40af; }
.s-partial { background:#fef3c7; color:#92400e; }

.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:flex-end; }
.modal-bg.open { display:flex; }
.modal { background:white; border-radius:20px 20px 0 0; padding:20px; width:100%; max-height:88vh; overflow-y:auto; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 16px; }
.modal-title { font-size:18px; font-weight:800; margin-bottom:14px; }

.toast { position:fixed; bottom:90px; left:16px; right:16px; padding:12px 16px; border-radius:10px; font-size:14px; font-weight:600; color:white; z-index:300; display:none; text-align:center; }
.toast.show { display:block; animation:fadeUp 0.3s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.t-ok { background:var(--success); }
.t-err { background:var(--danger); }
.t-info { background:var(--teal); }
.t-warn { background:var(--accent); }

.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.empty-ico { font-size:48px; margin-bottom:12px; }
.empty-txt { font-size:15px; font-weight:600; }
.empty-sub { font-size:13px; margin-top:4px; }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; gap:12px; color:var(--muted); }
.spin { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--teal); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="logo">AM</div>
    <div>
      <div class="h-title">Packing System</div>
      <div class="h-sub" id="hSub">Kitchens &amp; Wardrobes</div>
    </div>
  </div>
  <button class="sheets-badge" onclick="checkConn()">
    <div class="dot" id="connDot"></div>Sheets
  </button>
</div>

<!-- JOB BAR -->
<div class="job-bar" id="jobBar">
  <p>No job selected — tap Pack to select a job</p>
</div>

<!-- PAGES -->
<div class="page active" id="pg-pack"></div>
<div class="page" id="pg-cutlist"></div>
<div class="page" id="pg-label"></div>
<div class="page" id="pg-report"></div>
<div class="page" id="pg-setup"></div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" id="nav-pack" onclick="goPage('pack')">
    <div class="ni">📦</div><div class="nl">Pack</div>
  </button>
  <button class="nav-item" id="nav-cutlist" onclick="goPage('cutlist')">
    <div class="ni">📋</div><div class="nl">Cutlist</div>
  </button>
  <button class="nav-item" id="nav-label" onclick="goPage('label')">
    <div class="ni">🏷️</div><div class="nl">Label</div>
  </button>
  <button class="nav-item" id="nav-report" onclick="goPage('report')">
    <div class="ni">📊</div><div class="nl">Report</div>
  </button>
  <button class="nav-item" id="nav-setup" onclick="goPage('setup')">
    <div class="ni">⚙️</div><div class="nl">Setup</div>
  </button>
</div>

<!-- MODAL: SELECT ORDER -->
<div class="modal-bg" id="mOrders">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="modal-title" style="margin:0">Select Customer</div>
    </div>
    <input class="inp" id="oSearch" placeholder="Search by name or order no..." oninput="searchOrders(this.value)" style="margin-bottom:12px"/>
    <div id="oResults"><div class="loading"><div class="spin"></div><span>Loading...</span></div></div>
    <div style="text-align:center;margin:12px 0;color:var(--muted);font-size:13px">— Ya naya order banao —</div>
    <button class="btn btn-outline" onclick="openNewOrder()">+ Add New Order</button>
  </div>
</div>

<!-- MODAL: NEW ORDER -->
<div class="modal-bg" id="mNewOrder">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New Order</div>
    <div class="input-grp">
      <label class="lbl">Order No</label>
      <input class="inp" id="nOrderNo" placeholder="e.g. O-AK 0026/348/12/2025"/>
    </div>
    <div class="input-grp">
      <label class="lbl">Customer Name *</label>
      <input class="inp" id="nCustName" placeholder="e.g. Shubham Ji"/>
    </div>
    <div class="input-grp">
      <label class="lbl">Type</label>
      <div class="chip-row" id="typeChips">
        <button class="chip active" onclick="pickType(this,'Wardrobe')">Wardrobe</button>
        <button class="chip" onclick="pickType(this,'Kitchen')">Kitchen</button>
        <button class="chip" onclick="pickType(this,'Both')">Both</button>
        <button class="chip" onclick="pickType(this,'Other')">Other</button>
      </div>
    </div>
    <div class="input-grp">
      <label class="lbl">Address</label>
      <input class="inp" id="nAddr" placeholder="e.g. #332/6, Panchkula"/>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-outline btn-sm" onclick="closeModal('mNewOrder')">Cancel</button>
      <button class="btn btn-primary btn-sm" style="flex:2" onclick="saveOrder()">Save Order</button>
    </div>
  </div>
</div>

<!-- MODAL: SEAL BOX -->
<div class="modal-bg" id="mSeal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Seal Box</div>
    <div class="input-grp">
      <label class="lbl">Notes (optional)</label>
      <input class="inp" id="sealNotes" placeholder="e.g. Fragile items"/>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-outline btn-sm" onclick="closeModal('mSeal')">Cancel</button>
      <button class="btn btn-primary btn-sm" style="flex:2" onclick="doSeal()">🔒 Seal Box</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG — APNA GAS URL YAHAN DAALO ──────────────────
var GAS_URL = 'https://script.google.com/a/macros/amaccreato.com/s/AKfycbx45o0HYTLvgGyS9BNWhOZrx2qJKZQ_TnKzPXXR2g0RWC2P7w5s792EGApuscJpj5Ni/exec';

// ── STATE ──────────────────────────────────────────────
var S = {
  order: null,
  box: 'BOX-01',
  packer: '',
  boxPanels: [],
  cutlist: [],
  orderType: 'Wardrobe',
  camStream: null,
  scanning: false,
  lastCode: null,
  zxingReader: null
};

// ── API CALL ───────────────────────────────────────────
function api(fn, params, cb, errCb) {
  var url = GAS_URL + '?fn=' + fn + '&' + objToQuery(params);
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { if (errCb) errCb({message: data.error}); return; }
      if (cb) cb(data.result !== undefined ? data.result : data);
    })
    .catch(function(e) { if (errCb) errCb(e); });
}

function apiPost(fn, body, cb, errCb) {
  // Use GET with encoded data to avoid CORS issues
  var url = GAS_URL + '?fn=' + fn + '&data=' + encodeURIComponent(JSON.stringify(body));
  fetch(url)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { if (errCb) errCb({message: data.error}); return; }
    if (cb) cb(data.result !== undefined ? data.result : data);
  })
  .catch(function(e) { if (errCb) errCb(e); });
}

function objToQuery(obj) {
  if (!obj) return '';
  return Object.keys(obj).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(obj[k]);
  }).join('&');
}

// ── BOOT ──────────────────────────────────────────────
window.onload = function() {
  drawPack();
  loadSettings();
  document.addEventListener('click', function(e) {
    var modals = ['mOrders','mNewOrder','mSeal'];
    for (var i = 0; i < modals.length; i++) {
      var el = document.getElementById(modals[i]);
      if (el && e.target === el) el.classList.remove('open');
    }
  });
};

function loadSettings() {
  api('getSettings', {}, function(s) {
    S.packer = s.PackerName || '';
    var el = document.getElementById('hSub');
    if (el) el.textContent = (s.CompanyName || 'AMAC') + ' · ' + (s.City || 'Mohali');
    document.getElementById('connDot').style.background = '#4ade80';
  }, function() {
    document.getElementById('connDot').style.background = '#f87171';
  });
}

// ── NAVIGATION ─────────────────────────────────────────
function goPage(name) {
  var pages = ['pack','cutlist','label','report','setup'];
  for (var i = 0; i < pages.length; i++) {
    document.getElementById('pg-' + pages[i]).classList.remove('active');
    document.getElementById('nav-' + pages[i]).classList.remove('active');
  }
  document.getElementById('pg-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'pack') drawPack();
  else if (name === 'cutlist') drawCutlist();
  else if (name === 'label') drawLabel();
  else if (name === 'report') drawReport();
  else if (name === 'setup') drawSetup();
}

// ── JOB BAR ────────────────────────────────────────────
function updateJobBar() {
  var bar = document.getElementById('jobBar');
  if (!S.order) {
    bar.innerHTML = '<p>No job selected — tap Pack to select a job</p>';
    return;
  }
  var o = S.order;
  bar.innerHTML = '<div><div class="job-name">' + esc(o.OrderNo) + '</div><div class="job-meta">' + esc(o.CustomerName) + ' · ' + esc(o.Type) + ' · ' + esc(o.Address||'') + '</div></div><button class="btn-edit" onclick="openOrders()">Edit Job</button>';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PACK PAGE ──────────────────────────────────────────
function drawPack() {
  var pg = document.getElementById('pg-pack');
  updateJobBar();
  if (!S.order) {
    pg.innerHTML = '<div class="empty" style="margin-top:40px"><div class="empty-ico">📦</div><div class="empty-txt">No Job Selected</div><div class="empty-sub">Select an order to start packing</div><button class="btn btn-primary" style="margin-top:20px;max-width:240px" onclick="openOrders()">+ Select / Create Order</button></div>';
    return;
  }
  var total = parseInt(S.order.TotalPanels) || 0;
  var boxChips = ['BOX-01','BOX-02','BOX-03','BOX-04','BOX-05','BOX-06','BOX-07','BOX-08','BOX-09','BOX-10'].map(function(b) {
    return '<button class="chip ' + (b===S.box?'active':'') + '" onclick="switchBox(\'' + b + '\')">' + b + '</button>';
  }).join('');

  pg.innerHTML =
    '<div class="card" style="text-align:center">' +
      '<div class="card-title">Current Box <span style="float:right;color:var(--teal)">' + S.box + '</span></div>' +
      '<div class="circle-wrap"><div class="circle"><div class="c-num" id="cNum">' + S.boxPanels.length + '</div><div class="c-total">of ' + total + '</div></div></div>' +
      '<div style="color:var(--muted);font-size:13px;font-weight:600">panels in box</div>' +
      '<div class="chip-row" style="justify-content:center;margin-top:12px">' + boxChips + '</div>' +
    '</div>' +
    '<div class="card" style="padding:12px 14px">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
        '<div class="card-title" style="margin:0">Panels in Box</div>' +
        '<span style="color:var(--danger);font-size:13px;font-weight:600;cursor:pointer" onclick="clearBox()">Clear</span>' +
      '</div>' +
      '<div id="panelList">' + renderPanelList() + '</div>' +
    '</div>' +
    '<div style="background:#1a1a2e;border-radius:12px;padding:20px;margin-bottom:12px;text-align:center;">' +
      '<div style="color:white;font-size:14px;font-weight:600;margin-bottom:12px;">📷 SCAN PANEL BARCODE</div>' +
      '<input type="text" id="barcodeInput" placeholder="Barcode scan here..." ' +
        'style="width:100%;padding:14px;font-size:16px;border-radius:8px;border:2px solid #1a8a7a;background:white;text-align:center;" ' +
        'oninput="handleBarcodeInput(this.value)" autofocus/>' +
      '<div style="color:rgba(255,255,255,0.6);font-size:12px;margin-top:8px">Agar aapke paas barcode scanner gun hai toh usse scan karo<br>Ya neeche manually type karo</div>' +
    '</div>' +
    '<div class="manual-box">' +
      '<div class="manual-lbl">YA MANUALLY TYPE KARO</div>' +
      '<div class="manual-row">' +
        '<input class="manual-inp" id="mInp" placeholder="Panel ID type karo" onkeydown="if(event.key===\'Enter\')doManual()"/>' +
        '<button class="btn-add-m" onclick="doManual()">Add</button>' +
      '</div>' +
    '</div>' +
    '<div id="resultArea"></div>' +

function uploadCSV(inp) {
  var file = inp.files[0];
  if (!file) return;
  toast('Reading file...', 'info');
  
  var reader = new FileReader();
  reader.onload = function(e) {
    var csvText = e.target.result;
    var orderId = S.order.OrderID;
    
    // Parse CSV in browser, send rows in chunks via GET
    var delimiter = csvText.split('\n')[0].indexOf(';') >= 0 ? ';' : ',';
    var lines = csvText.trim().split('\n');
    var headers = lines[0].split(delimiter).map(function(h) { return h.trim().replace(/"/g,'').toLowerCase(); });
    
    function findCol(aliases) {
      for (var a = 0; a < aliases.length; a++) {
        var idx = headers.indexOf(aliases[a]);
        if (idx !== -1) return idx;
      }
      return -1;
    }
    
    var cols = {
      barcode: findCol(['barcode']),
      cnc1: findCol(['cnc_1']),
      cnc2: findCol(['cnc_2']),
      partname: findCol(['partname','part_name']),
      artdesc: findCol(['art_desc','artdesc']),
      matname: findCol(['matname','material']),
      cleng: findCol(['cleng','finishlength','l1']),
      cwidth: findCol(['cwidth','finishwidth','finishwitdh','w1']),
      thickness: findCol(['finishthickness','cut_thk','thickness'])
    };
    
    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var vals = line.split(delimiter).map(function(v) { return v.trim().replace(/"/g,'').replace(/
/g,''); });
      
      var barcode = cols.barcode >= 0 ? vals[cols.barcode] : '';
      var cnc1 = cols.cnc1 >= 0 ? vals[cols.cnc1] : '';
      var cnc2 = cols.cnc2 >= 0 ? vals[cols.cnc2] : '';
      var partname = cols.partname >= 0 ? vals[cols.partname] : '';
      var artdesc = cols.artdesc >= 0 ? vals[cols.artdesc] : '';
      var matname = cols.matname >= 0 ? vals[cols.matname] : '';
      var l1 = cols.cleng >= 0 ? vals[cols.cleng] : '';
      var w1 = cols.cwidth >= 0 ? vals[cols.cwidth] : '';
      var thickness = cols.thickness >= 0 ? vals[cols.thickness] : '';
      
      if (!barcode) continue;
      
      rows.push([barcode, partname, artdesc, matname, l1, w1, thickness]);
      if (cnc1 && cnc1 !== barcode) rows.push([cnc1, partname, artdesc, matname, l1, w1, thickness]);
      if (cnc2 && cnc2 !== barcode && cnc2 !== cnc1) rows.push([cnc2, partname, artdesc, matname, l1, w1, thickness]);
    }
    
    // Send all rows via GET in chunks of 50
    var CHUNK = 50;
    var total = rows.length;
    var sent = 0;
    
    toast('Uploading ' + total + ' panels...', 'info');
    
    function sendChunk(start) {
      if (start >= rows.length) {
        // All done
        api('finalizeCutlist', { orderId: orderId, count: Math.floor(total/2) }, function() {
          toast('✅ ' + total + ' entries loaded!', 'ok');
          loadCutlist();
        }, function() {
          toast('✅ Upload done!', 'ok');
          loadCutlist();
        });
        return;
      }
      
      var chunk = rows.slice(start, start + CHUNK);
      var url = GAS_URL + '?fn=insertRows&orderId=' + encodeURIComponent(orderId) + 
                '&rows=' + encodeURIComponent(JSON.stringify(chunk)) +
                '&clear=' + (start === 0 ? '1' : '0');
      
      fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          sent += chunk.length;
          var pct = Math.round(sent / rows.length * 100);
          toast('Uploading... ' + pct + '%', 'info');
          sendChunk(start + CHUNK);
        })
        .catch(function(e) {
          // Try next chunk anyway
          sendChunk(start + CHUNK);
        });
    }
    
    sendChunk(0);
  };
  reader.readAsText(file);
}

          '<button class="btn btn-secondary btn-sm" onclick="editSet(\'City\',\'City\',\'sv-city\')">Edit</button>' +
        '</div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0">' +
          '<div><div style="font-size:14px;font-weight:600">Packer Name</div><div style="font-size:13px;color:var(--muted)" id="sv-packer">' + esc(s.PackerName||'Not set') + '</div></div>' +
          '<button class="btn btn-secondary btn-sm" onclick="editSet(\'PackerName\',\'Packer Name\',\'sv-packer\')">Edit</button>' +
        '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="card-title">Actions</div>' +
        '<button class="btn btn-secondary" style="margin-bottom:8px" onclick="doSetup()">🔧 Initialize Google Sheets</button>' +
        '<button class="btn btn-outline" onclick="openOrders()">📦 Manage Orders</button>' +
      '</div>' +
      '<div class="card" style="background:var(--teal-light)">' +
        '<div style="font-size:13px;color:var(--teal);font-weight:600">AMAC Packing System v3.0</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-top:4px">GitHub Pages + Google Apps Script</div>' +
      '</div>';
  }, function() {
    pg.innerHTML = '<div style="padding:16px;color:var(--danger)">Error loading settings.</div><button class="btn btn-primary" style="margin:16px" onclick="doSetup()">🔧 Initialize Sheets</button>';
  });
}

function editSet(key, label, elId) {
  var curr = document.getElementById(elId) ? document.getElementById(elId).textContent : '';
  var val = prompt(label + ' enter karo:', curr==='Not set' ? '' : curr);
  if (val === null) return;
  apiPost('saveSetting', { key: key, value: val }, function() {
    var el = document.getElementById(elId);
    if (el) el.textContent = val||'Not set';
    if (key==='PackerName') S.packer = val;
    toast(label + ' updated!', 'ok');
    loadSettings();
  }, function() { toast('Save failed', 'err'); });
}

function doSetup() {
  toast('Setting up...', 'info');
  api('setupSheets', {}, function() { toast('✅ Sheets ready!', 'ok'); }, function(e) { toast('Error: '+(e.message||''), 'err'); });
}

function checkConn() {
  api('getSettings', {}, function() {
    toast('✅ Connected!', 'ok');
    document.getElementById('connDot').style.background = '#4ade80';
  }, function() {
    toast('Cannot connect', 'err');
    document.getElementById('connDot').style.background = '#f87171';
  });
}

function openModal(id) { var el=document.getElementById(id); if(el) el.classList.add('open'); }
function closeModal(id) { var el=document.getElementById(id); if(el) el.classList.remove('open'); }

var toastTimer = null;
function toast(msg, type) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.className = 'toast show t-' + (type||'info');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
